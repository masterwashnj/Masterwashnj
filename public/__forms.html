<!DOCTYPE html>
<html>
  <head><meta charset="utf-8" /></head>
  <body>
    <!-- Detección de Netlify Forms (Next runtime v5). El envío real lo hace
         el formulario multi-paso por fetch a "/". -->
    <form name="contacto-masterwash" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contacto-masterwash" />
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="service" />
      <input type="text" name="vehicle" />
      <input type="date" name="date" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
